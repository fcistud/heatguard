# Cloud Build → Artifact Registry → Cloud Run
# Trigger: gcloud builds submit --config cloudbuild.yaml
#
# Substitutions (override with --substitutions=KEY=VALUE):
#   _REGION       Cloud Run region (default us-central1)
#   _SERVICE      Cloud Run service name (default heatguard)
#   _AR_REPO      Artifact Registry repo name (default heatguard)

substitutions:
  _REGION: us-central1
  _SERVICE: heatguard
  _AR_REPO: heatguard

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=120
      - --set-env-vars=HEATGUARD_DATA_DIR=/app/data,HEATGUARD_STATIC_DIR=/app/static,HEATGUARD_LANDING_DIR=/app/landing

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
